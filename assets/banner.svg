<svg viewBox="0 0 1200 360" width="1200" height="360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <radialGradient id="bed" cx="32%" cy="20%" r="100%">
      <stop offset="0%" stop-color="#242a3a"/>
      <stop offset="52%" stop-color="#181c25"/>
      <stop offset="100%" stop-color="#101218"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8aa0ff"/>
      <stop offset="100%" stop-color="#5c77f0"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect x="4" y="4" width="1192" height="352" rx="22" fill="url(#bed)" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

  <!-- ===== left: identity ===== -->
  <g>
    <rect x="72" y="84" width="66" height="66" rx="15" fill="#14171c" stroke="rgba(255,255,255,0.07)"/>
    <text x="105" y="127" text-anchor="middle" font-family="'SF Mono', ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="27" font-weight="700" letter-spacing="1.5" fill="#ffffff">PC</text>

    <text x="156" y="128" font-size="54" font-weight="700" letter-spacing="-1.5" fill="#f4f6fa">Page<tspan fill="#8aa0ff">Clean</tspan></text>
    <text x="159" y="166" font-size="18.5" font-weight="500" letter-spacing="0.1" fill="#aab3c2">Flat, clean, scanner-quality pages from phone photos.</text>

    <!-- feature pills -->
    <g font-size="13" font-weight="600">
      <rect x="159" y="188" width="190" height="29" rx="14.5" fill="rgba(54,79,199,0.18)" stroke="rgba(124,143,255,0.45)"/>
      <circle cx="178" cy="202.5" r="3.4" fill="#8aa0ff"/>
      <text x="190" y="207" fill="#c7d1ff">Runs in your browser</text>

      <rect x="361" y="188" width="178" height="29" rx="14.5" fill="rgba(240,140,0,0.14)" stroke="rgba(240,140,0,0.45)"/>
      <circle cx="380" cy="202.5" r="3.4" fill="#f6a839"/>
      <text x="392" y="207" fill="#f3cf9a">Nothing is uploaded</text>
    </g>

    <!-- filmstrip stepper -->
    <g>
      <line x1="178" y1="292" x2="520" y2="292" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
      <!-- node 1 (active / amber) -->
      <circle cx="178" cy="292" r="15" fill="#f08c00"/>
      <text x="178" y="297" text-anchor="middle" font-family="'SF Mono', ui-monospace, monospace" font-size="13" font-weight="700" fill="#ffffff">1</text>
      <!-- nodes 2-5 -->
      <g font-family="'SF Mono', ui-monospace, monospace" font-size="13" font-weight="600">
        <circle cx="263.5" cy="292" r="15" fill="#1b2030" stroke="rgba(124,143,255,0.40)"/><text x="263.5" y="297" text-anchor="middle" fill="#aeb6c4">2</text>
        <circle cx="349" cy="292" r="15" fill="#1b2030" stroke="rgba(124,143,255,0.40)"/><text x="349" y="297" text-anchor="middle" fill="#aeb6c4">3</text>
        <circle cx="434.5" cy="292" r="15" fill="#1b2030" stroke="rgba(124,143,255,0.40)"/><text x="434.5" y="297" text-anchor="middle" fill="#aeb6c4">4</text>
        <circle cx="520" cy="292" r="15" fill="#1b2030" stroke="rgba(124,143,255,0.40)"/><text x="520" y="297" text-anchor="middle" fill="#aeb6c4">5</text>
      </g>
      <g font-size="11.5" font-weight="500" fill="#8b94a4" text-anchor="middle">
        <text x="178" y="325">Orient</text>
        <text x="263.5" y="325">Dewarp</text>
        <text x="349" y="325">Crop</text>
        <text x="434.5" y="325">Color</text>
        <text x="520" y="325">Export</text>
      </g>
    </g>
  </g>

  <!-- ===== right: before -> after ===== -->
  <!-- BEFORE: tilted phone photo with a skewed page + corner handles -->
  <g transform="rotate(-8 812 192)">
    <rect x="726" y="88" width="172" height="208" rx="11" fill="#0e1117" stroke="rgba(255,255,255,0.10)"/>
    <polygon points="756,124 872,114 882,268 744,280" fill="#eef0f3"/>
    <!-- faux text lines following the page -->
    <g stroke="#b9c0cc" stroke-width="3" stroke-linecap="round">
      <line x1="772" y1="150" x2="858" y2="142"/>
      <line x1="772" y1="170" x2="861" y2="162"/>
      <line x1="770" y1="190" x2="863" y2="182"/>
      <line x1="769" y1="210" x2="846" y2="203"/>
      <line x1="767" y1="230" x2="858" y2="222"/>
    </g>
    <!-- amber corner handles -->
    <g fill="#ffffff" stroke="#f08c00" stroke-width="3">
      <circle cx="756" cy="124" r="8"/>
      <circle cx="872" cy="114" r="8"/>
      <circle cx="882" cy="268" r="8"/>
      <circle cx="744" cy="280" r="8"/>
    </g>
  </g>

  <!-- arrow -->
  <g stroke="#f08c00" stroke-width="4" stroke-linecap="round" fill="none">
    <line x1="918" y1="192" x2="952" y2="192"/>
    <polyline points="942,182 954,192 942,202"/>
  </g>

  <!-- AFTER: clean upright page with music staves -->
  <rect x="984" y="100" width="168" height="208" rx="10" fill="#000000" opacity="0.32"/>
  <rect x="980" y="92" width="168" height="208" rx="10" fill="#ffffff"/>
  <!-- three staves -->
  <g stroke="#c3cad6" stroke-width="1.4">
    <g>
      <line x1="998" y1="124" x2="1134" y2="124"/><line x1="998" y1="132" x2="1134" y2="132"/><line x1="998" y1="140" x2="1134" y2="140"/><line x1="998" y1="148" x2="1134" y2="148"/><line x1="998" y1="156" x2="1134" y2="156"/>
    </g>
    <g>
      <line x1="998" y1="186" x2="1134" y2="186"/><line x1="998" y1="194" x2="1134" y2="194"/><line x1="998" y1="202" x2="1134" y2="202"/><line x1="998" y1="210" x2="1134" y2="210"/><line x1="998" y1="218" x2="1134" y2="218"/>
    </g>
    <g>
      <line x1="998" y1="248" x2="1134" y2="248"/><line x1="998" y1="256" x2="1134" y2="256"/><line x1="998" y1="264" x2="1134" y2="264"/><line x1="998" y1="272" x2="1134" y2="272"/><line x1="998" y1="280" x2="1134" y2="280"/>
    </g>
  </g>
  <!-- note heads + stems (indigo accent) -->
  <g fill="#364fc7">
    <ellipse cx="1018" cy="148" rx="5.5" ry="3.8"/><rect x="1022.5" y="126" width="2" height="22" fill="#364fc7"/>
    <ellipse cx="1046" cy="140" rx="5.5" ry="3.8"/><rect x="1050.5" y="118" width="2" height="22" fill="#364fc7"/>
    <ellipse cx="1074" cy="132" rx="5.5" ry="3.8"/><rect x="1078.5" y="110" width="2" height="22" fill="#364fc7"/>
    <ellipse cx="1102" cy="148" rx="5.5" ry="3.8"/><rect x="1106.5" y="126" width="2" height="22" fill="#364fc7"/>

    <ellipse cx="1022" cy="210" rx="5.5" ry="3.8"/><rect x="1026.5" y="188" width="2" height="22" fill="#364fc7"/>
    <ellipse cx="1058" cy="202" rx="5.5" ry="3.8"/><rect x="1062.5" y="180" width="2" height="22" fill="#364fc7"/>
    <ellipse cx="1094" cy="194" rx="5.5" ry="3.8"/><rect x="1098.5" y="172" width="2" height="22" fill="#364fc7"/>
  </g>
</svg>
